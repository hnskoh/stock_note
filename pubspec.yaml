name: stock_note
description: Personal stock trading journal with Google Drive sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.5.1

  # --- Navigation ---
  go_router: ^14.2.0

  # --- Database: SQLite ---
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.0
  path_provider: ^2.1.3

  # --- Google Auth & Drive ---
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # --- Secure Storage ---
  flutter_secure_storage: ^9.0.0

  # --- Connectivity ---
  connectivity_plus: ^6.0.3

  # --- Utilities ---
  intl: ^0.19.0
  uuid: ^4.4.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # --- Code Generation (freezed only) ---
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # --- Testing ---
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/db/
