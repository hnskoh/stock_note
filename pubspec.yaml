name: stock_note
description: Personal stock trading journal with Firebase sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.5.1

  # --- Navigation ---
  go_router: ^14.2.0

  # --- Firebase ---
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0

  # --- Google Auth ---
  google_sign_in: ^6.2.1

  # --- Utilities ---
  intl: ^0.19.0
  uuid: ^4.4.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # --- Code Generation ---
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # --- Testing ---
  mockito: ^5.4.4

flutter:
  uses-material-design: true
